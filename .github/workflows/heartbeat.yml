name: Heartbeat - Frontend Development

on:
  schedule:
    - cron: '7,13,19,25,31,37,43,49,55,1 * * * *'   # every 6 minutes, UTC
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run heartbeat tests
        run: npx playwright test --project=heartbeat

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Zip Playwright report
        if: always()
        run: zip -r playwright-report.zip playwright-report

      - name: Send email with report
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: sandbox.smtp.mailtrap.io
          server_port: 2525
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Heartbeat Test Report - Failure
          body: |
            The heartbeat tests for the frontend development have failed. Please find the attached report for details.
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          secure: true
          attachments: playwright-report.zip